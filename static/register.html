<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account — AudioLens AI</title>
  <meta name="description" content="Create your free AudioLens AI account to get started.">
  <link rel="stylesheet" href="/static/styles.css">
  <style>
    .auth-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 32px 16px;
    }

    .auth-card {
      width: min(460px, 100%);
      padding: clamp(28px, 6vw, 48px);
      border: 1px solid rgba(222, 216, 204, .85);
      border-radius: 28px;
      background: rgba(255, 255, 255, .92);
      box-shadow: 0 24px 80px rgba(33, 43, 54, .10);
      backdrop-filter: blur(16px);
      animation: fadeUp .45s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }

    .auth-logo-dot {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: var(--accent);
      display: grid;
      place-items: center;
    }

    .auth-logo-dot svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .auth-logo-name {
      font-size: .72rem;
      font-weight: 800;
      letter-spacing: .14em;
      color: var(--accent-dark);
    }

    .auth-title {
      font-family: Georgia, serif;
      font-size: clamp(1.9rem, 5vw, 2.5rem);
      letter-spacing: -.035em;
      line-height: 1.1;
      margin: 0 0 8px;
    }

    .auth-subtitle {
      color: var(--muted);
      margin: 0 0 30px;
      font-size: .97rem;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-weight: 700;
      font-size: .9rem;
      margin-bottom: 7px;
    }

    .form-group input {
      transition: border-color .2s, box-shadow .2s;
    }

    .auth-btn {
      width: 100%;
      margin-top: 8px;
      padding: 15px;
      font-size: 1rem;
      letter-spacing: .01em;
      border-radius: 14px;
      border: 1px solid transparent;
      background: var(--accent);
      color: white;
      font-weight: 800;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }

    .auth-btn:hover {
      background: var(--accent-dark);
    }

    .auth-btn:active {
      transform: scale(.98);
    }

    .auth-btn:disabled {
      opacity: .55;
      cursor: not-allowed;
    }

    .auth-divider {
      text-align: center;
      color: var(--muted);
      font-size: .9rem;
      margin: 22px 0;
      position: relative;
    }

    .auth-divider::before,
    .auth-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 38%;
      height: 1px;
      background: var(--line);
    }

    .auth-divider::before { left: 0; }
    .auth-divider::after  { right: 0; }

    .auth-switch {
      text-align: center;
      color: var(--muted);
      font-size: .93rem;
    }

    .auth-switch a {
      color: var(--accent-dark);
      font-weight: 700;
      text-decoration: none;
    }

    .auth-switch a:hover {
      text-decoration: underline;
    }

    .auth-error {
      display: none;
      color: #b42318;
      background: #fff0ee;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: .9rem;
      margin-bottom: 16px;
    }

    .auth-error.visible {
      display: block;
      animation: fadeUp .3s ease;
    }

    .auth-success {
      display: none;
      color: #0a6640;
      background: #edfaf4;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: .9rem;
      margin-bottom: 16px;
    }

    .auth-success.visible {
      display: block;
      animation: fadeUp .3s ease;
    }

    .btn-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    .password-hint {
      font-size: .82rem;
      color: var(--muted);
      margin-top: 5px;
    }

    .password-wrap {
      position: relative;
    }

    .password-wrap input {
      padding-right: 48px;
    }

    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: var(--muted);
      display: flex;
      align-items: center;
      transition: color .2s;
    }

    .eye-btn:hover { color: var(--ink); }
  </style>
</head>

<body>
  <div class="auth-shell">
    <div class="auth-card">

      <div class="auth-logo">
        <div class="auth-logo-dot">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3zm-7 9a1 1 0 0 1 2 0 5 5 0 0 0 10 0 1 1 0 0 1 2 0 7 7 0 0 1-6 6.93V20h3a1 1 0 0 1 0 2H8a1 1 0 0 1 0-2h3v-2.07A7 7 0 0 1 5 11z"/>
          </svg>
        </div>
        <span class="auth-logo-name">AUDIOLENS AI</span>
      </div>

      <h1 class="auth-title">Create account.</h1>
      <p class="auth-subtitle">Start turning spoken words into useful insights.</p>

      <p class="auth-error" id="errorBox"></p>
      <p class="auth-success" id="successBox"></p>

      <form id="registerForm" autocomplete="on">
        <div class="form-group">
          <label for="full_name">Full Name</label>
          <input id="full_name" type="text" placeholder="Kartik Garg" autocomplete="name" required>
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input id="username" type="text" placeholder="kartik" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <div class="password-wrap">
            <input id="password" type="password" placeholder="Create a strong password" autocomplete="new-password" required>
            <button type="button" class="eye-btn" id="togglePassword" aria-label="Show password">
              <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
          <p class="password-hint">Use at least 8 characters.</p>
        </div>
        <button class="auth-btn" id="registerBtn" type="submit">Create Account</button>
      </form>

      <div class="auth-divider">or</div>

      <p class="auth-switch">
        Already have an account? <a href="/static/login.html">Sign in</a>
      </p>

    </div>
  </div>

  <script>
    // Eye toggle
    document.getElementById('togglePassword').addEventListener('click', function() {
      const input = document.getElementById('password');
      const isHidden = input.type === 'password';
      input.type = isHidden ? 'text' : 'password';
      document.getElementById('eyeIcon').innerHTML = isHidden
        ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
        : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    });

    const form       = document.getElementById('registerForm');
    const btn        = document.getElementById('registerBtn');
    const errorBox   = document.getElementById('errorBox');
    const successBox = document.getElementById('successBox');

    function showError(msg) {
      errorBox.textContent = msg;
      errorBox.classList.add('visible');
      successBox.classList.remove('visible');
    }

    function showSuccess(msg) {
      successBox.textContent = msg;
      successBox.classList.add('visible');
      errorBox.classList.remove('visible');
    }

    function setLoading(loading) {
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<span class="btn-spinner"></span>Creating account…'
        : 'Create Account';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.classList.remove('visible');

      const full_name = document.getElementById('full_name').value.trim();
      const username  = document.getElementById('username').value.trim();
      const password  = document.getElementById('password').value;

      if (!full_name || !username || !password) {
        showError('Please fill in all fields.');
        return;
      }

      if (password.length < 8) {
        showError('Password must be at least 8 characters.');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password, full_name }),
        });

        const data = await res.json();

        if (!res.ok) {
          showError(data.detail || 'Registration failed. Please try again.');
          return;
        }

        showSuccess('Account created! Redirecting to sign in…');
        setTimeout(() => { window.location.href = '/static/login.html'; }, 1200);

      } catch (err) {
        showError('Network error. Is the server running?');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>

</html>
